<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matches — Fútbol Mundial</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Matches" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #1a1a1a; --surface2: #242424;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
      --text: #f0f0f0; --text2: #888; --text3: #555;
      --accent: #3b82f6; --live: #ef4444; --green: #22c55e;
      --green-bg: rgba(34,197,94,0.12); --red-bg: rgba(239,68,68,0.12);
      --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(13,13,13,0.96); backdrop-filter: blur(16px); border-top: 0.5px solid var(--border); display: flex; z-index: 200; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 12px; cursor: pointer; border: none; background: transparent; color: var(--text3); font-size: 10px; gap: 4px; transition: color 0.15s; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }
    .page { display: none; }
    .page.active { display: block; }
    .header { position: sticky; top: 0; z-index: 100; background: rgba(13,13,13,0.92); backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--border); padding: 1rem 1.25rem 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.875rem; }
    .app-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    .app-title span { color: var(--accent); }
    .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--live); font-weight: 500; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--live); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .date-scroll { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 0.875rem; }
    .date-scroll::-webkit-scrollbar { display: none; }
    .date-btn { flex-shrink: 0; background: transparent; border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .date-btn:hover { border-color: var(--border2); color: var(--text); }
    .date-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .main { padding: 1rem 1.25rem; }
    .page-title { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; letter-spacing: -0.02em; }
    .summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
    .summary-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
    .summary-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .summary-value { font-size: 22px; font-weight: 600; }
    .summary-value.live-val { color: var(--live); }
    .filter-scroll { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 1.25rem; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-pill { flex-shrink: 0; background: transparent; border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .filter-pill:hover { border-color: var(--border2); color: var(--text); }
    .filter-pill.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }
    .league-section { margin-bottom: 1.5rem; }
    .league-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .league-logo { width: 16px; height: 16px; object-fit: contain; opacity: 0.8; }
    .league-name { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
    .league-fav-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 2px; opacity: 0.4; transition: opacity 0.15s; }
    .league-fav-btn:hover, .league-fav-btn.active { opacity: 1; }
    .league-line { flex: 1; height: 0.5px; background: var(--border); }
    .match-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
    .match-card:hover { border-color: var(--border2); }
    .match-card.expanded { border-color: var(--accent); }
    .match-card.live-card { border-color: rgba(239,68,68,0.3); }
    .match-row { display: flex; align-items: center; gap: 12px; }
    .match-time { font-size: 12px; color: var(--text2); min-width: 44px; font-variant-numeric: tabular-nums; }
    .match-time.live { color: var(--live); font-weight: 600; }
    .teams { flex: 1; }
    .team-row { display: flex; align-items: center; justify-content: space-between; padding: 2.5px 0; gap: 8px; }
    .team-info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .team-logo { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
    .team-name { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-name.bold { font-weight: 600; }
    .score { font-size: 14px; font-weight: 600; min-width: 16px; text-align: center; font-variant-numeric: tabular-nums; }
    .score.live { color: var(--live); }
    .match-footer { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; }
    .badge-free { background: var(--green-bg); color: var(--green); }
    .badge-pay { background: var(--red-bg); color: #f87171; }
    .badge-unknown { background: var(--surface2); color: var(--text3); }
    .stadium-text { font-size: 11px; color: var(--text3); }
    .match-status-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
    .status-ns { background: var(--surface2); color: var(--text3); }
    .status-live { background: var(--red-bg); color: var(--live); }
    .status-ft { background: var(--surface2); color: var(--text2); }
    .match-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
    .match-card.expanded .match-detail { display: block; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .detail-item-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .detail-item-value { font-size: 13px; color: var(--text); }
    .search-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 1.25rem; }
    .search-bar input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; }
    .search-bar input::placeholder { color: var(--text3); }
    .search-bar svg { width: 18px; height: 18px; color: var(--text3); flex-shrink: 0; }
    .search-result-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
    .search-result-item:hover { border-color: var(--border2); }
    .search-result-name { font-size: 14px; color: var(--text); }
    .search-result-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .standings-select { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; color: var(--text); font-size: 14px; margin-bottom: 1.25rem; outline: none; cursor: pointer; }
    .standings-table { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .standings-row { display: grid; grid-template-columns: 26px 1fr 28px 28px 28px 28px 34px; align-items: center; padding: 10px 14px; border-bottom: 0.5px solid var(--border); font-size: 13px; gap: 2px; }
    .standings-row:last-child { border-bottom: none; }
    .standings-row.header { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 14px; background: var(--surface2); }
    .standings-pos { color: var(--text2); }
    .standings-team { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    .standings-team-logo { width: 16px; height: 16px; object-fit: contain; }
    .standings-num { text-align: center; color: var(--text2); }
    .standings-pts { text-align: center; font-weight: 600; }
    .pos-promote { border-left: 3px solid #22c55e; }
    .pos-relegate { border-left: 3px solid var(--live); }
    .pos-europe { border-left: 3px solid var(--accent); }
    .fav-league-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .fav-remove-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; padding: 0 4px; transition: color 0.15s; line-height: 1; }
    .fav-remove-btn:hover { color: var(--live); }
    .loading { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
    .loading-spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; line-height: 1.6; }
    .quota-warning { background: rgba(239,68,68,0.08); border: 0.5px solid rgba(239,68,68,0.2); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; color: #f87171; text-align: center; }
  </style>
</head>
<body>

<div class="page active" id="page-matches">
  <div class="header">
    <div class="header-top">
      <div class="app-title">⚽ <span>Matches</span></div>
      <div class="live-indicator" id="live-indicator" style="display:none"><span class="live-dot"></span> EN DIRECTO</div>
    </div>
    <div class="date-scroll" id="date-nav"></div>
  </div>
  <div class="main">
    <div id="quota-warning" style="display:none" class="quota-warning">⚠️ Límite diario de requests alcanzado (100/día). Vuelve mañana.</div>
    <div class="summary-bar">
      <div class="summary-card"><div class="summary-label">Partidos</div><div class="summary-value" id="total-matches">—</div></div>
      <div class="summary-card"><div class="summary-label">En directo</div><div class="summary-value live-val" id="live-count">—</div></div>
      <div class="summary-card"><div class="summary-label">Ligas</div><div class="summary-value" id="league-count">—</div></div>
    </div>
    <div class="filter-scroll" id="filter-bar"><span class="filter-pill active" data-league="all">Todos</span></div>
    <div id="matches-container"><div class="loading"><div class="loading-spinner"></div>Cargando partidos...</div></div>
  </div>
</div>

<div class="page" id="page-search">
  <div class="main" style="padding-top:1.5rem">
    <div class="page-title">Buscar</div>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Nombre del equipo..." autocomplete="off" />
    </div>
    <div id="search-results"><div class="empty">Escribe al menos 2 letras para buscar.</div></div>
  </div>
</div>

<div class="page" id="page-standings">
  <div class="main" style="padding-top:1.5rem">
    <div class="page-title">Clasificación</div>
    <select class="standings-select" id="standings-select">
      <option value="39">Premier League</option>
      <option value="140">La Liga</option>
      <option value="78">Bundesliga</option>
      <option value="135">Serie A</option>
      <option value="61">Ligue 1</option>
      <option value="2">Champions League</option>
      <option value="253">MLS</option>
      <option value="71">Brasileirao</option>
      <option value="94">Primeira Liga</option>
      <option value="88">Eredivisie</option>
    </select>
    <div id="standings-container"><div class="loading"><div class="loading-spinner"></div>Cargando...</div></div>
  </div>
</div>

<div class="page" id="page-favorites">
  <div class="main" style="padding-top:1.5rem">
    <div class="page-title">Favoritos</div>
    <div id="favorites-container"></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" data-page="matches">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Partidos
  </button>
  <button class="nav-btn" data-page="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Buscar
  </button>
  <button class="nav-btn" data-page="standings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    Tabla
  </button>
  <button class="nav-btn" data-page="favorites">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    Favoritos
  </button>
</nav>

<script>
const API_KEY = '7a0197482f9a19562a9a2acdc852aaf3';
const API_BASE = 'https://v3.football.api-sports.io';

let allEvents = [], selectedLeague = 'all', expandedId = null;
let favorites = JSON.parse(localStorage.getItem('fav_leagues_v2') || '[]');

// Cache para no desperdiciar requests
const cache = {};

async function apiFetch(endpoint) {
  if (cache[endpoint]) return cache[endpoint];
  const res = await fetch(`${API_BASE}${endpoint}`, {
    headers: { 'x-apisports-key': API_KEY }
  });
  if (res.status === 429) {
    document.getElementById('quota-warning').style.display = 'block';
    throw new Error('Quota exceeded');
  }
  const data = await res.json();
  // Avisar si se acerca al límite
  const remaining = res.headers.get('x-ratelimit-requests-remaining');
  if (remaining !== null && parseInt(remaining) < 10) {
    document.getElementById('quota-warning').style.display = 'block';
  }
  cache[endpoint] = data;
  return data;
}

// Navegación
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-' + page).classList.add('active');
    if (page === 'standings') loadStandings();
    if (page === 'favorites') renderFavorites();
  });
});

function formatDate(d) { return d.toISOString().split('T')[0]; }

function buildDateNav() {
  const nav = document.getElementById('date-nav');
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = -2; i <= 5; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (i === 0 ? ' active' : '');
    if (i === 0) btn.textContent = 'Hoy';
    else if (i === 1) btn.textContent = 'Mañana';
    else if (i === -1) btn.textContent = 'Ayer';
    else btn.textContent = d.toLocaleDateString('es-ES', {weekday:'short', day:'numeric', month:'short'});
    btn.addEventListener('click', () => {
      document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fetchMatches(formatDate(d));
    });
    nav.appendChild(btn);
  }
}

function getStatusInfo(fixture) {
  const s = fixture.status.short;
  const liveStatuses = ['1H','HT','2H','ET','BT','P','SUSP','INT','LIVE'];
  const isLive = liveStatuses.includes(s);
  const elapsed = fixture.status.elapsed;

  let label, cssClass;
  if (s === 'NS') { label = 'Por jugar'; cssClass = 'status-ns'; }
  else if (s === 'FT') { label = 'Final'; cssClass = 'status-ft'; }
  else if (s === 'HT') { label = 'Descanso'; cssClass = 'status-live'; }
  else if (s === 'AET') { label = 'Final (prórroga)'; cssClass = 'status-ft'; }
  else if (s === 'PEN') { label = 'Final (penaltis)'; cssClass = 'status-ft'; }
  else if (isLive && elapsed) { label = elapsed + "'"; cssClass = 'status-live'; }
  else { label = s; cssClass = 'status-ns'; }

  return { isLive, label, cssClass };
}

function formatTime(dateStr) {
  // dateStr es UTC, convertir a hora local
  const d = new Date(dateStr);
  return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

async function fetchMatches(dateStr) {
  const container = document.getElementById('matches-container');
  container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Cargando partidos...</div>';
  try {
    const data = await apiFetch(`/fixtures?date=${dateStr}&timezone=Europe/Madrid`);
    allEvents = data.response || [];
    selectedLeague = 'all';
    buildFilters();
    renderMatches();
  } catch(err) {
    if (err.message !== 'Quota exceeded') {
      container.innerHTML = '<div class="empty">No se pudieron cargar los partidos.</div>';
    } else {
      container.innerHTML = '<div class="empty">Límite diario de requests alcanzado.<br>Vuelve mañana.</div>';
    }
  }
}

function buildFilters() {
  const bar = document.getElementById('filter-bar');
  const favLeagueNames = [...new Set(
    allEvents.filter(e => favorites.includes(e.league.name)).map(e => e.league.name)
  )];
  const allLeagueNames = [...new Set(allEvents.map(e => e.league.name))].sort();

  bar.innerHTML = '<span class="filter-pill active" data-league="all">Todos</span>';
  if (favLeagueNames.length) bar.innerHTML += '<span class="filter-pill" data-league="__favs__">⭐ Favoritos</span>';
  allLeagueNames.forEach(l => {
    const pill = document.createElement('span');
    pill.className = 'filter-pill';
    pill.dataset.league = l;
    pill.textContent = (favorites.includes(l) ? '⭐ ' : '') + l;
    bar.appendChild(pill);
  });
  bar.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      bar.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedLeague = pill.dataset.league;
      renderMatches();
    });
  });
}

function renderMatches() {
  const container = document.getElementById('matches-container');
  let filtered;
  if (selectedLeague === 'all') filtered = allEvents;
  else if (selectedLeague === '__favs__') filtered = allEvents.filter(e => favorites.includes(e.league.name));
  else filtered = allEvents.filter(e => e.league.name === selectedLeague);

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">No hay partidos para este filtro.</div>';
    ['total-matches','live-count','league-count'].forEach(id => document.getElementById(id).textContent = '0');
    document.getElementById('live-indicator').style.display = 'none';
    return;
  }

  const liveEvents = filtered.filter(e => getStatusInfo(e.fixture).isLive);
  document.getElementById('total-matches').textContent = filtered.length;
  document.getElementById('live-count').textContent = liveEvents.length;

  // Agrupar por liga
  const byLeague = {};
  filtered.forEach(e => {
    const key = e.league.name;
    if (!byLeague[key]) byLeague[key] = { meta: e.league, events: [] };
    byLeague[key].events.push(e);
  });
  document.getElementById('league-count').textContent = Object.keys(byLeague).length;
  document.getElementById('live-indicator').style.display = liveEvents.length > 0 ? 'flex' : 'none';

  let html = '';
  Object.entries(byLeague).forEach(([leagueName, { meta, events }]) => {
    const isFav = favorites.includes(leagueName);
    const logoImg = meta.logo ? `<img class="league-logo" src="${meta.logo}" alt="" onerror="this.style.display='none'">` : '';
    html += `<div class="league-section"><div class="league-header">
      ${logoImg}
      <span class="league-name">${leagueName}</span>
      <button class="league-fav-btn ${isFav ? 'active' : ''}" data-league="${leagueName}">${isFav ? '⭐' : '☆'}</button>
      <span class="league-line"></span></div>`;

    events.forEach(e => {
      const { isLive, label: statusLabel, cssClass: statusCss } = getStatusInfo(e.fixture);
      const notStarted = e.fixture.status.short === 'NS';
      const hs = (!notStarted && e.goals.home !== null) ? e.goals.home : '-';
      const as2 = (!notStarted && e.goals.away !== null) ? e.goals.away : '-';
      const time = formatTime(e.fixture.date);
      const stadium = e.fixture.venue.name || '';
      const city = e.fixture.venue.city || '';
      const venueText = [stadium, city].filter(Boolean).join(', ');

      const homeLogo = e.teams.home.logo ? `<img class="team-logo" src="${e.teams.home.logo}" alt="" onerror="this.style.display='none'">` : '';
      const awayLogo = e.teams.away.logo ? `<img class="team-logo" src="${e.teams.away.logo}" alt="" onerror="this.style.display='none'">` : '';

      const homeWin = !notStarted && e.goals.home !== null && e.goals.away !== null && e.goals.home > e.goals.away;
      const awayWin = !notStarted && e.goals.home !== null && e.goals.away !== null && e.goals.away > e.goals.home;

      html += `<div class="match-card ${isLive ? 'live-card' : ''} ${expandedId === String(e.fixture.id) ? 'expanded' : ''}" data-id="${e.fixture.id}">
        <div class="match-row">
          <div class="match-time ${isLive ? 'live' : ''}">${isLive ? `<span style="font-size:10px;color:#ef4444;font-weight:700">● ${statusLabel}</span>` : time}</div>
          <div class="teams">
            <div class="team-row">
              <div class="team-info">${homeLogo}<span class="team-name ${homeWin?'bold':''}">${e.teams.home.name}</span></div>
              <span class="score ${isLive?'live':''}">${hs}</span>
            </div>
            <div class="team-row">
              <div class="team-info">${awayLogo}<span class="team-name ${awayWin?'bold':''}">${e.teams.away.name}</span></div>
              <span class="score ${isLive?'live':''}">${as2}</span>
            </div>
          </div>
        </div>
        <div class="match-footer">
          <span class="match-status-badge ${statusCss}">${statusLabel}</span>
          ${venueText ? `<span class="stadium-text">📍 ${venueText}</span>` : ''}
        </div>
        <div class="match-detail"><div class="detail-grid">
          <div class="detail-item"><div class="detail-item-label">Estadio</div><div class="detail-item-value">${stadium||'—'}</div></div>
          <div class="detail-item"><div class="detail-item-label">Ciudad</div><div class="detail-item-value">${city||'—'}</div></div>
          <div class="detail-item"><div class="detail-item-label">Árbitro</div><div class="detail-item-value">${e.fixture.referee||'—'}</div></div>
          <div class="detail-item"><div class="detail-item-label">Estado</div><div class="detail-item-value">${e.fixture.status.long||'—'}</div></div>
          <div class="detail-item"><div class="detail-item-label">Jornada</div><div class="detail-item-value">${e.league.round||'—'}</div></div>
          <div class="detail-item"><div class="detail-item-label">País</div><div class="detail-item-value">${e.league.country||'—'}</div></div>
        </div></div>
      </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;

  container.querySelectorAll('.match-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      container.querySelectorAll('.match-card').forEach(c => c.classList.remove('expanded'));
      if (expandedId === id) { expandedId = null; }
      else { expandedId = id; card.classList.add('expanded'); }
    });
  });

  container.querySelectorAll('.league-fav-btn').forEach(btn => {
    btn.addEventListener('click', ev => {
      ev.stopPropagation();
      const l = btn.dataset.league;
      if (favorites.includes(l)) { favorites = favorites.filter(f => f !== l); btn.textContent = '☆'; btn.classList.remove('active'); }
      else { favorites.push(l); btn.textContent = '⭐'; btn.classList.add('active'); }
      localStorage.setItem('fav_leagues_v2', JSON.stringify(favorites));
      buildFilters();
    });
  });
}

// SEARCH
let searchTimeout;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (q.length < 2) { document.getElementById('search-results').innerHTML = '<div class="empty">Escribe al menos 2 letras para buscar.</div>'; return; }
  searchTimeout = setTimeout(() => searchTeams(q), 500);
});

async function searchTeams(q) {
  const container = document.getElementById('search-results');
  container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Buscando...</div>';
  try {
    const data = await apiFetch(`/teams?search=${encodeURIComponent(q)}`);
    const teams = (data.response || []).slice(0, 10);
    if (!teams.length) { container.innerHTML = '<div class="empty">Sin resultados.</div>'; return; }
    container.innerHTML = teams.map(t => `
      <div class="search-result-item" data-teamid="${t.team.id}" data-teamname="${t.team.name}">
        <div style="display:flex;align-items:center;gap:10px">
          ${t.team.logo ? `<img src="${t.team.logo}" style="width:28px;height:28px;object-fit:contain" onerror="this.style.display='none'">` : ''}
          <div>
            <div class="search-result-name">${t.team.name}</div>
            <div class="search-result-sub">${[t.team.country].filter(Boolean).join(' · ')}</div>
          </div>
        </div>
        <span style="color:var(--text3);font-size:18px">›</span>
      </div>`).join('');
    container.querySelectorAll('.search-result-item').forEach(item => {
      item.addEventListener('click', () => searchTeamEvents(item.dataset.teamid, item.dataset.teamname));
    });
  } catch { container.innerHTML = '<div class="empty">Error al buscar.</div>'; }
}

async function searchTeamEvents(teamId, teamName) {
  const container = document.getElementById('search-results');
  container.innerHTML = `<button id="back-btn" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;margin-bottom:1rem;padding:0">← Volver</button><div class="loading"><div class="loading-spinner"></div>Cargando partidos...</div>`;
  document.getElementById('back-btn').addEventListener('click', () => {
    const q = document.getElementById('search-input').value.trim();
    if (q.length >= 2) searchTeams(q);
    else container.innerHTML = '<div class="empty">Escribe al menos 2 letras para buscar.</div>';
  });
  try {
    const today = formatDate(new Date());
    const data = await apiFetch(`/fixtures?team=${teamId}&next=8`);
    const events = data.response || [];
    let html = `<button id="back-btn2" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;margin-bottom:1rem;padding:0">← Volver</button>`;
    html += `<div style="font-size:13px;color:var(--text2);margin-bottom:12px">Próximos partidos · <strong style="color:var(--text)">${teamName}</strong></div>`;
    if (!events.length) { container.innerHTML = html + '<div class="empty">Sin próximos partidos.</div>'; }
    else {
      events.forEach(e => {
        const date = new Date(e.fixture.date).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
        const time = formatTime(e.fixture.date);
        html += `<div class="search-result-item" style="flex-direction:column;align-items:flex-start;gap:5px;cursor:default">
          <div style="display:flex;justify-content:space-between;width:100%">
            <span style="font-size:12px;color:var(--text2)">${date} ${time}</span>
            <span style="font-size:11px;color:var(--text3)">${e.league.name||''}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;font-size:14px">
            ${e.teams.home.logo?`<img src="${e.teams.home.logo}" style="width:18px;height:18px;object-fit:contain" onerror="this.style.display='none'">` : ''}
            ${e.teams.home.name} <span style="color:var(--text3)">vs</span>
            ${e.teams.away.logo?`<img src="${e.teams.away.logo}" style="width:18px;height:18px;object-fit:contain" onerror="this.style.display='none'">` : ''}
            ${e.teams.away.name}
          </div>
          ${e.fixture.venue.name?`<div style="font-size:11px;color:var(--text3)">📍 ${e.fixture.venue.name}</div>`:''}
        </div>`;
      });
      container.innerHTML = html;
    }
    container.querySelector('#back-btn2').addEventListener('click', () => {
      const q = document.getElementById('search-input').value.trim();
      if (q.length >= 2) searchTeams(q);
      else container.innerHTML = '<div class="empty">Escribe al menos 2 letras para buscar.</div>';
    });
  } catch { container.innerHTML = '<div class="empty">Error al cargar.</div>'; }
}

// STANDINGS
async function loadStandings() {
  const leagueId = document.getElementById('standings-select').value;
  const container = document.getElementById('standings-container');
  container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Cargando...</div>';
  try {
    // Las temporadas de fútbol van con año de inicio: 2024 = temporada 2024-25
    // Probamos 2024 primero, luego 2023 como fallback
    let data = await apiFetch(`/standings?league=${leagueId}&season=2024`);
    if (!data.response || !data.response.length) {
      data = await apiFetch(`/standings?league=${leagueId}&season=2023`);
    }
    const standings = data.response?.[0]?.league?.standings?.[0] || [];
    const seasonYear = data.response?.[0]?.league?.season;
    if (!standings.length) { container.innerHTML = '<div class="empty">No hay datos para esta liga.</div>'; return; }

    const seasonLabel = seasonYear ? `<div style="font-size:11px;color:var(--text3);margin-bottom:10px">Temporada ${seasonYear}-${String(seasonYear+1).slice(2)}</div>` : '';
    let html = seasonLabel + '<div class="standings-table"><div class="standings-row header"><span>#</span><span>Equipo</span><span>PJ</span><span>G</span><span>P</span><span>E</span><span>Pts</span></div>';
    standings.forEach((t) => {
      const pos = t.rank;
      const total = standings.length;
      let cls = '';
      if (pos <= 4) cls = 'pos-promote';
      else if (pos <= 6) cls = 'pos-europe';
      else if (pos >= total - 2) cls = 'pos-relegate';

      const logo = t.team.logo ? `<img class="standings-team-logo" src="${t.team.logo}" alt="" onerror="this.style.display='none'">` : '';
      html += `<div class="standings-row ${cls}">
        <span class="standings-pos">${pos}</span>
        <span class="standings-team">${logo}${t.team.name}</span>
        <span class="standings-num">${t.all.played||0}</span>
        <span class="standings-num">${t.all.win||0}</span>
        <span class="standings-num">${t.all.lose||0}</span>
        <span class="standings-num">${t.all.draw||0}</span>
        <span class="standings-pts">${t.points||0}</span>
      </div>`;
    });
    html += '</div><div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--text3);padding:0 2px">';
    html += '<span><span style="display:inline-block;width:3px;height:10px;background:#22c55e;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Champions</span>';
    html += '<span><span style="display:inline-block;width:3px;height:10px;background:var(--accent);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Europa</span>';
    html += '<span><span style="display:inline-block;width:3px;height:10px;background:var(--live);border-radius:2px;margin-right:4px;vertical-align:middle"></span>Descenso</span></div>';
    container.innerHTML = html;
  } catch { container.innerHTML = '<div class="empty">Error al cargar la clasificación.</div>'; }
}

document.getElementById('standings-select').addEventListener('change', loadStandings);

// FAVORITES
function renderFavorites() {
  const container = document.getElementById('favorites-container');
  if (!favorites.length) {
    container.innerHTML = '<div class="empty">Aún no tienes favoritos.<br><br>Ve a partidos y pulsa ☆ junto a cualquier liga para guardarla aquí.</div>';
    return;
  }
  container.innerHTML = favorites.map(l => `
    <div class="fav-league-card">
      <span style="font-size:14px">⭐ ${l}</span>
      <button class="fav-remove-btn" data-league="${l}">×</button>
    </div>`).join('');
  container.querySelectorAll('.fav-remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      favorites = favorites.filter(f => f !== btn.dataset.league);
      localStorage.setItem('fav_leagues_v2', JSON.stringify(favorites));
      renderFavorites();
    });
  });
}

buildDateNav();
fetchMatches(formatDate(new Date()));
loadStandings();
</script>
